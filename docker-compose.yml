version: "3.9"

services:
  app:
    build: .
    ports:
      - "8080:8000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    env_file:
      - .env                   # non-sensitive config only (safe to commit)
    environment:
      # ── Secrets injected from host shell environment ───────────────────────
      # These are NEVER stored in .env. Docker Compose reads them from the
      # shell that runs `docker compose up`. The :? syntax makes compose fail
      # immediately with a clear error if a required secret is missing.
      #
      # To set them:  source ~/content-engine-secrets.sh  (see scripts/set-secrets.sh.example)

      # Gemini
      GEMINI_API_KEY: "${GEMINI_API_KEY:?GEMINI_API_KEY not set — source your secrets file}"

      # WordPress Application Password (Basic Auth)
      WORDPRESS_USERNAME: "${WORDPRESS_USERNAME:?WORDPRESS_USERNAME not set}"
      WORDPRESS_APP_PASSWORD: "${WORDPRESS_APP_PASSWORD:?WORDPRESS_APP_PASSWORD not set}"

      # LinkedIn OAuth (client creds are always required; token fields are optional until auth)
      LINKEDIN_CLIENT_ID: "${LINKEDIN_CLIENT_ID:?LINKEDIN_CLIENT_ID not set}"
      LINKEDIN_CLIENT_SECRET: "${LINKEDIN_CLIENT_SECRET:?LINKEDIN_CLIENT_SECRET not set}"
      LINKEDIN_ACCESS_TOKEN: "${LINKEDIN_ACCESS_TOKEN:-}"       # empty until first OAuth
      LINKEDIN_PERSON_URN: "${LINKEDIN_PERSON_URN:-}"           # empty until first OAuth
      LINKEDIN_TOKEN_ISSUED_AT: "${LINKEDIN_TOKEN_ISSUED_AT:-}" # empty until first OAuth

      # Database password (credentials must match the db service below)
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}"
      DATABASE_URL: "postgresql+asyncpg://content:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}@db:5432/content_engine"

      # App secret key (used for signing session data)
      SECRET_KEY: "${SECRET_KEY:?SECRET_KEY not set}"

    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-content}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}"
      POSTGRES_DB: "${POSTGRES_DB:-content_engine}"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-content} -d ${POSTGRES_DB:-content_engine}"]
      interval: 5s
      timeout: 5s
      retries: 5

